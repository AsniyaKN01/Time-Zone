services:
  - type: web
    name: time-zone-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGINS
        value: https://your-netlify-app.netlify.app

