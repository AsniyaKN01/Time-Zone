<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oxy - Login</title>
    <style>
      :root {
        --bg1: #0f172a;
        --bg2: #6d28d9;
        --bg3: #06b6d4;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --card: rgba(15, 23, 42, 0.72);
        --border: rgba(148, 163, 184, 0.35);
        --input: rgba(255, 255, 255, 0.1);
        --primary: #22d3ee;
        --primary-2: #a78bfa;
      }
      :root[data-theme="light"] {
        --bg1: #f0f9ff;
        --bg2: #dbeafe;
        --bg3: #f9a8d4;
        --text: #0f172a;
        --muted: #334155;
        --card: rgba(255, 255, 255, 0.78);
        --border: rgba(100, 116, 139, 0.28);
        --input: rgba(255, 255, 255, 0.85);
        --primary: #3b82f6;
        --primary-2: #14b8a6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, Helvetica, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 15%, var(--bg3), transparent 35%),
          radial-gradient(circle at 80% 20%, #ec4899, transparent 30%),
          linear-gradient(135deg, var(--bg1), var(--bg2));
        background-size: 220% 220%;
        animation: hueFlow 16s ease-in-out infinite;
        padding: 1.5rem;
      }
      @keyframes hueFlow {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        body {
          animation: none;
        }
      }
      .card {
        width: min(520px, 100%);
        padding: 1.5rem;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        backdrop-filter: blur(8px);
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.4rem;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.3rem;
      }
      .brand img {
        width: 42px;
        height: 42px;
      }
      input {
        width: 100%;
        padding: 0.65rem 0.75rem;
        margin-top: 0.35rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--input);
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
      }
      label {
        display: block;
        margin-top: 0.95rem;
        color: var(--muted);
      }
      button {
        margin-top: 1rem;
        padding: 0.65rem 1rem;
        border: 0;
        border-radius: 10px;
        color: #0f172a;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        font-weight: 700;
        cursor: pointer;
      }
      .error {
        color: #fecaca;
        margin-top: 0.85rem;
      }
      .muted {
        color: var(--muted);
        font-size: 0.95rem;
      }
      a {
        color: #67e8f9;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .topbar {
        position: fixed;
        top: 1rem;
        right: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <button id="themeToggle" type="button">Theme</button>
    </div>
    <div class="card">
      <div class="brand">
        <img src="/oxy-logo.svg" alt="Oxy logo" />
        <h1>Oxy Login</h1>
      </div>
      <div class="muted">Use your username or email and password.</div>

      <form id="loginForm">
        <label for="usernameOrEmail">Username or Email</label>
        <input id="usernameOrEmail" name="usernameOrEmail" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
      </form>

      <div id="error" class="error" style="display: none;"></div>

      <div class="muted" style="margin-top: 1rem;">
        No account? <a href="/register.html">Register</a>
      </div>
    </div>

    <script type="module" src="/theme.js"></script>
    <script type="module" src="/login.js"></script>
  </body>
</html>
